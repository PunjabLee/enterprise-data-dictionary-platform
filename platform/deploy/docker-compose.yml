name: metadata-platform-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: metadata-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metadata_platform}
      POSTGRES_USER: ${POSTGRES_USER:-metadata_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metadata_app_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: metadata-platform-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
