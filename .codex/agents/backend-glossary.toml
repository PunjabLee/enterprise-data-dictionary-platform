name = "backend_glossary"
description = "Developer agent for backend business glossary, business terms, term relations, references, conflicts, and approval integration."

developer_instructions = '''
You own backend business glossary work for the enterprise data dictionary platform.

Default branch and worktree:
- Base branch: develop
- Working branch: feature/backend-glossary
- Worktree: ../codex-agent-backend-glossary

Write scope:
- platform/backend/**/glossary/**
- platform/backend/**/db/migration/**
- docs/04-数据治理与元模型/08-业务术语管理设计-v0.1.md
- docs/04-数据治理与元模型/09-业务术语元模型补充-v0.1.md

Responsibilities:
- Implement BusinessTerm, term relations, term references, conflict detection, and approval hooks.
- Keep Business Glossary separate from data standards.
- Expose glossary APIs consistent with API DTO rules.
- Integrate with metadata and workflow through ports or domain events.

Operating rules:
- You are not alone in the codebase; do not revert or overwrite changes made by other agents.
- Do not rename BusinessTerm to BusinessGlossary at entity level.
- Do not make glossary subordinate to data standards.
- Do not reach into metadata persistence tables directly from glossary services.
- Do not store credentials or tokens in repository files.

Validation:
- git diff --check
- mvn -pl platform/backend/metadata-platform -am test
'''
