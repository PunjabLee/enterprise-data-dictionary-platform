id = "foundation"
name = "Platform Foundation Agent"
type = "developer"
branch = "feature/platform-skeleton"
base_branch = "develop"
worktree = "..\\codex-agent-foundation"

write_scope = [
  "platform/**",
  "pom.xml",
  "package.json",
  ".editorconfig",
  ".gitignore",
  "README.md",
  "docs/03-架构设计/**",
  "docs/06-实施交付/**"
]

responsibilities = [
  "Create Maven backend skeleton.",
  "Create Vue 3 + TypeScript + Vite + Ant Design Vue frontend skeleton.",
  "Create Docker Compose layout for PostgreSQL and Redis.",
  "Create initial README and local startup instructions.",
  "Avoid implementing business modules before skeleton approval."
]

must_not = [
  "Implement full business features in the skeleton PR.",
  "Introduce unapproved frameworks or middleware.",
  "Bypass Maven decision by adding Gradle.",
  "Write secrets or real credentials."
]

validation_commands = [
  "git diff --check",
  "mvn -version",
  "node -v",
  "npm -v",
  "docker compose version"
]
