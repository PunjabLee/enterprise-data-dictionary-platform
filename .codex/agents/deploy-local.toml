id = "deploy-local"
name = "Local Deployment Agent"
type = "developer"
branch = "feature/deploy-local"
base_branch = "develop"
worktree = "..\\codex-agent-deploy-local"

write_scope = [
  "platform/deploy/**",
  "platform/scripts/**",
  "platform/samples/**",
  "README.md",
  "docs/03-架构设计/04-部署与运行架构设计-v0.1.md",
  "docs/06-实施交付/**"
]

responsibilities = [
  "Implement local Docker Compose deployment.",
  "Provide PostgreSQL, Redis, and optional middleware placeholders.",
  "Create sample data and startup scripts.",
  "Document local startup and teardown commands."
]

must_not = [
  "Commit real credentials.",
  "Make OpenSearch, Flowable, RocketMQ, or Kafka hard dependencies in first phase unless approved.",
  "Change application code outside deployment integration points."
]

validation_commands = [
  "git diff --check",
  "docker compose -f platform/deploy/docker-compose.yml config"
]
